<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuizCheck.AI | Expert Evaluation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; }
        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .input-card:focus-within { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        #resBox { transition: all 0.5s ease; border-width: 2px; }
        textarea { scrollbar-width: none; }
        textarea::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="glass-header sticky top-0 z-50 px-8 py-4 flex justify-between items-center">
        <h1 class="text-xl font-800 tracking-tighter text-slate-900">QuizCheck<span class="text-blue-600">.AI</span></h1>
        <div class="flex items-center space-x-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span>Server Live</span>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full space-y-6">
            <div class="bg-white p-8 md:p-10 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-slate-100">
                <div class="space-y-5">
                    <input type="text" id="studentName" placeholder="Student Full Name" class="w-full p-4 rounded-2xl outline-none text-slate-700 font-semibold border-2 border-slate-50 focus:border-blue-500 transition-all">
                    
                    <textarea id="question" oninput="autoExpand(this)" placeholder="The Quiz Question..." class="w-full p-4 rounded-2xl outline-none text-slate-600 min-h-[80px] border-2 border-slate-50 focus:border-blue-500 transition-all overflow-hidden resize-none"></textarea>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <textarea id="correctAnswer" oninput="autoExpand(this)" placeholder="Teacher Key" class="w-full p-4 rounded-2xl outline-none text-sm min-h-[100px] border-2 border-slate-50 focus:border-emerald-500 transition-all overflow-hidden resize-none"></textarea>
                        <textarea id="studentAnswer" oninput="autoExpand(this)" placeholder="Student Submission" class="w-full p-4 rounded-2xl outline-none text-sm min-h-[100px] border-2 border-slate-50 focus:border-indigo-500 transition-all overflow-hidden resize-none"></textarea>
                    </div>

                    <button onclick="check()" id="btn" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-bold shadow-xl hover:bg-black transition-all active:scale-95">Evaluate Performance</button>

                    <div id="loader" class="hidden text-center text-blue-500 text-xs font-black uppercase animate-pulse italic py-2">AI is analyzing...</div>

                    <div id="resBox" class="hidden mt-8 p-8 bg-slate-900 text-white rounded-[32px] relative">
                        <div class="flex items-center justify-between mb-4 border-b border-slate-800 pb-4">
                            <h3 id="reportTitle" class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em]">Tutor Report</h3>
                            <button onclick="copyText()" class="text-slate-500 hover:text-white transition text-xs font-bold uppercase">Copy</button>
                        </div>
                        <p id="resText" class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap italic font-light mb-6"></p>
                        <div class="pt-4 border-t border-slate-800">
                            <button onclick="resetSession()" class="text-[10px] text-slate-500 hover:text-red-400 font-bold uppercase tracking-widest transition-colors flex items-center gap-2">↺ Reset Session</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function autoExpand(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }

        async function check() {
            const btn = document.getElementById('btn');
            const resBox = document.getElementById('resBox');
            const resText = document.getElementById('resText');
            const reportTitle = document.getElementById('reportTitle');
            const data = {
                studentName: document.getElementById('studentName').value,
                question: document.getElementById('question').value,
                correctAnswer: document.getElementById('correctAnswer').value,
                studentAnswer: document.getElementById('studentAnswer').value
            };
            if (!data.studentName || !data.question) return alert("Fill all fields.");
            document.getElementById('loader').classList.remove('hidden');
            resBox.classList.add('hidden');
            btn.disabled = true;

            try {
                const r = await fetch('http://localhost:3000/check-answer', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const d = await r.json();
                resText.innerText = d.feedback;

                if (d.feedback.includes("1/10") || d.feedback.includes("2/10") || d.feedback.includes("3/10") || d.feedback.includes("4/10")) {
                    resBox.style.boxShadow = "0 0 30px rgba(239, 68, 68, 0.4)"; 
                    resBox.style.borderColor = "#ef4444";
                    reportTitle.style.color = "#ef4444";
                } else if (d.feedback.includes("8/10") || d.feedback.includes("9/10") || d.feedback.includes("10/10")) {
                    resBox.style.boxShadow = "0 0 30px rgba(34, 197, 94, 0.4)"; 
                    resBox.style.borderColor = "#22c55e";
                    reportTitle.style.color = "#22c55e";
                } else {
                    resBox.style.boxShadow = "0 0 30px rgba(59, 130, 246, 0.4)"; 
                    resBox.style.borderColor = "#3b82f6";
                    reportTitle.style.color = "#60a5fa";
                }
                resBox.classList.remove('hidden');
            } catch (e) { alert("Connection Error"); }
            finally { document.getElementById('loader').classList.add('hidden'); btn.disabled = false; }
        }

        function resetSession() {
            document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            document.getElementById('resBox').classList.add('hidden');
            document.querySelectorAll('textarea').forEach(t => t.style.height = 'auto');
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('resText').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
